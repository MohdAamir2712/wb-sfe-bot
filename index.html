<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WB SFE Support Bot</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --wb-navy: #0f2547;
  --wb-blue: #1a56db;
  --wb-sky: #e8f0fd;
  --surface: #ffffff;
  --bg: #f1f5fb;
  --border: #dde4f0;
  --text: #1e293b;
  --muted: #64748b;
}
html, body { height: 100%; font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); }

.container {
  display: flex;
  flex-direction: column;
  height: 100vh;
  max-width: 900px;
  margin: 0 auto;
  background: var(--surface);
  box-shadow: 0 0 40px rgba(0,0,0,0.1);
}

.header {
  background: linear-gradient(135deg, var(--wb-navy) 0%, var(--wb-blue) 100%);
  color: white;
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.header-icon { font-size: 28px; }

.header-text h1 { font-size: 16px; margin: 0; font-weight: 600; }
.header-text p { font-size: 12px; margin: 2px 0 0 0; opacity: 0.8; }

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.message { display: flex; gap: 10px; margin-bottom: 8px; }
.message.user { flex-direction: row-reverse; }

.avatar {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}

.avatar.bot { background: var(--wb-sky); }
.avatar.user { background: var(--wb-blue); color: white; }

.bubble {
  max-width: 70%;
  padding: 12px 14px;
  border-radius: 12px;
  word-break: break-word;
  line-height: 1.5;
  font-size: 13px;
}

.message.bot .bubble {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
}

.message.user .bubble {
  background: var(--wb-blue);
  color: white;
}

.chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding: 0 20px;
  margin-bottom: 8px;
}

.chip-btn {
  padding: 6px 14px;
  border: 1px solid var(--border);
  border-radius: 20px;
  background: white;
  cursor: pointer;
  font-size: 12px;
  font-weight: 500;
  transition: all 0.2s;
  font-family: inherit;
}

.chip-btn:hover {
  background: var(--wb-sky);
  border-color: var(--wb-blue);
  transform: translateY(-2px);
}

.input-section {
  border-top: 1px solid var(--border);
  padding: 12px 20px;
  display: flex;
  gap: 10px;
  align-items: flex-end;
}

.input-section textarea {
  flex: 1;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px;
  font-family: inherit;
  font-size: 14px;
  resize: none;
  max-height: 100px;
}

.input-section textarea:focus {
  outline: none;
  border-color: var(--wb-blue);
}

.btn-icon {
  width: 40px;
  height: 40px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: white;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  transition: all 0.2s;
}

.btn-icon:hover {
  background: var(--wb-sky);
  border-color: var(--wb-blue);
}

.btn-icon.recording {
  background: #fee2e2;
  border-color: #ef4444;
  animation: pulse 1s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}

.send-btn {
  padding: 10px 20px;
  background: var(--wb-blue);
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 600;
  font-size: 14px;
  font-family: inherit;
  transition: all 0.2s;
}

.send-btn:hover { background: var(--wb-navy); }
.send-btn:disabled { background: var(--border); cursor: not-allowed; }

.footer {
  padding: 10px;
  text-align: center;
  font-size: 10px;
  color: var(--muted);
  border-top: 1px solid var(--border);
}

/* MODAL STYLES */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.5);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  font-family: 'Segoe UI', system-ui, sans-serif;
}

.modal-overlay.active { display: flex; }

.modal-box {
  background: white;
  padding: 40px;
  border-radius: 12px;
  max-width: 400px;
  width: 90%;
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
}

.modal-box h2 {
  font-size: 20px;
  margin-bottom: 10px;
  color: var(--wb-navy);
}

.modal-box p {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 24px;
}

.form-field {
  margin-bottom: 18px;
}

.form-field label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 6px;
  color: var(--text);
}

.form-field input,
.form-field select {
  width: 100%;
  padding: 10px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-family: inherit;
  font-size: 14px;
}

.form-field input:focus,
.form-field select:focus {
  outline: none;
  border-color: var(--wb-blue);
}

.form-error {
  color: #dc2626;
  font-size: 12px;
  margin-top: 4px;
}

.modal-submit {
  width: 100%;
  padding: 12px;
  background: var(--wb-blue);
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-weight: 600;
  font-size: 14px;
  font-family: inherit;
}

.modal-submit:hover { background: var(--wb-navy); }

#file-input { display: none; }

.file-preview {
  display: none;
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 8px;
  padding: 8px;
  background: var(--bg);
  border-radius: 4px;
}

.file-preview.show { display: block; }
</style>
</head>
<body>

<div class="container" id="chat-container" style="display:none;">
  <div class="header">
    <div class="header-icon">🏥</div>
    <div class="header-text">
      <h1>WB SFE / CRM Support Bot</h1>
      <p>Walter Bushnell · Multi-Language AI Assistant</p>
    </div>
  </div>

  <div class="chat-messages" id="messages"></div>

  <div class="chips" id="chips">
    <button class="chip-btn" onclick="quickReply('DCR Issue')">📋 DCR Issue</button>
    <button class="chip-btn" onclick="quickReply('MSL Issue')">👨‍⚕️ Doctor Issue</button>
    <button class="chip-btn" onclick="quickReply('MTP Issue')">📅 MTP Issue</button>
    <button class="chip-btn" onclick="quickReply('STP Issue')">🗺️ STP Issue</button>
    <button class="chip-btn" onclick="quickReply('Expense Issue')">💰 Expense Issue</button>
    <button class="chip-btn" onclick="quickReply('Leave Issue')">🏖️ Leave Issue</button>
    <button class="chip-btn" onclick="quickReply('ESSR Issue')">📊 ESSR Issue</button>
    <button class="chip-btn" onclick="quickReply('Other Issues')">❓ Other Issues</button>
  </div>

  <div class="input-section">
    <button class="btn-icon" onclick="toggleVoiceInput()" id="voice-btn" title="Voice Input">🎤</button>
    <button class="btn-icon" onclick="document.getElementById('file-input').click()" title="Attach File">📎</button>
    <input type="file" id="file-input" onchange="handleFileUpload(event)">
    <div class="file-preview" id="file-preview"></div>
    <textarea id="userInput" placeholder="Type your message in any language..." onkeypress="if(event.key=='Enter'&&!event.shiftKey){sendMessage();event.preventDefault();}"></textarea>
    <button class="btn-icon" onclick="toggleVoiceOutput()" id="tts-btn" title="Toggle Voice Reply">🔊</button>
    <button class="send-btn" onclick="sendMessage()">Send</button>
  </div>

  <div class="footer">
    SFE Support Team · Walter Bushnell · sfesupport@walterbushnell.com
  </div>
</div>

<!-- MODAL FORM -->
<div class="modal-overlay active" id="modal">
  <div class="modal-box">
    <h2>🙏 Welcome to WB SFE Support</h2>
    <p>Please enter your details to get started</p>

    <div class="form-field">
      <label>Email ID</label>
      <input type="email" id="emailInput" placeholder="your.email@walterbushnell.com">
      <div class="form-error" id="emailError"></div>
    </div>

    <div class="form-field">
      <label>Division</label>
      <select id="divisionInput">
        <option value="">-- Select Division --</option>
        <option value="Millennia">Millennia</option>
        <option value="Millennia-ACE">Millennia-ACE</option>
        <option value="Millennia-STAR">Millennia-STAR</option>
        <option value="Enlitia">Enlitia</option>
        <option value="Integra(Nepal)">Integra(Nepal)</option>
      </select>
      <div class="form-error" id="divisionError"></div>
    </div>

    <div class="form-field">
      <label>Headquarters (HQ)</label>
      <input type="text" id="hqInput" placeholder="e.g., Mumbai HQ">
      <div class="form-error" id="hqError"></div>
    </div>

    <button class="modal-submit" onclick="submitForm()">Continue to Chat</button>
  </div>
</div>

<script>
let userEmail = '';
let userDivision = '';
let userHQ = '';
let ttsEnabled = false;
let isRecording = false;
let recognition = null;
let attachedFile = null;

const SYS_PROMPT = `You are WB (Walter Bushnell) SFE/ESSR AI Support Assistant. You support field force in 5 divisions: Millennia, Millennia-ACE, Millennia-STAR, Enlitia, Integra (Nepal).

═══════════════════════════════════════════════════════════
CRITICAL RULES:
═══════════════════════════════════════════════════════════

1. **LANGUAGE DETECTION**: Detect user's language and reply in EXACT SAME LANGUAGE
   - If user writes in English → reply ONLY in English
   - If user writes in Hindi → reply in Hindi
   - If user writes in Marathi → reply in Marathi
   - NEVER mix languages or switch!

2. **CRITICAL - CORRECT EMAIL EVERYWHERE**:
   - Support Email: sfesupport@walterbushnell.com (ALWAYS - this is the ONLY correct email)
   - NEVER use sfesupport@walterevolution.com (WRONG - not valid)
   - Every escalation, error, screenshot → sfesupport@walterbushnell.com

═══════════════════════════════════════════════════════════
EXACT TRAINING DATA (User-Provided SOP):
═══════════════════════════════════════════════════════════

📋 **DCR (Daily Call Report):**

SUBMISSION:
- User must submit DCR within 48 hours after that day
- After 48 hours, SFE system locks automatically
- User cannot submit/edit locked DCR

UNLOCKING PROCESS:
How to submit unlock request:
1. Go to the Submit tab
2. Select the DCR unlock request option
3. Enter the unlock request
4. Send email to manager (SM)
5. After SM approval, SFE team will unlock that day report in system

TROUBLESHOOTING:
- If system doesn't allow user to fill the unlock request:
  → User takes screenshot and sends to sfesupport@walterbushnell.com

───────────────────────────────────────────────────────────

📅 **MTP (Monthly Tour Plan):**

HOW TO SUBMIT MTP/TP:
1. Go to the Submit tab in SFE
2. Select the TP/MTP option
3. Fill the MTP for whole month
4. Save it
5. Get the SM approval on system for MTP

ERROR - "Please plan all doctor":
- Means user has not planned all doctors in their list
- Solution: Plan all doctors in MTP
- If error persists: Take screenshot of error message and send to sfesupport@walterbushnell.com

───────────────────────────────────────────────────────────

💰 **EXPENSE:**

SUBMISSION TIMELINE:
- First Fortnight: Days 1-15 (submission period)
- Second Fortnight: Days 16-30/31 (submission period)
- User submits expense twice in one month

ERROR - "DCR pending for approval and rejection":
- Reason: SM approval pending for DCR unlock
- Solution: Get SM approval for unlocking OR
- If approval not possible: Send direct email to sfesupport@walterbushnell.com for rejection
- After that: User will be able to submit Expense details

ERROR - "Please create new STP":
- Meaning: Need to create new STP as per alert message
- Solution: Create the new STP
- After that: User will be able to submit Expense details

───────────────────────────────────────────────────────────

🗺️ **STP (Standard Tour Plan):** [SFE SYSTEM - NOT ESSR]

HOW TO MAKE NEW STP:
1. Go to the Submit tab in SFE system
2. Select the Standard Tour Plan option
3. Fill the details
4. Make the new STP
5. Needs: Sales Admin approval in system

ERROR - "This STP is already available in master":
- Meaning: STP already exists in Master STP database
- Solution: User needs to:
  1. Go to Master tab
  2. Select Master STP option
  3. Copy the STP (NO approval needed)
  
APPROVAL RULES:
- NEW STP (from Submit): Requires Sales Admin approval
- COPY STP (from Master): NO approval needed

───────────────────────────────────────────────────────────

📈 **MTP DEVIATION:** [SFE SYSTEM]

PURPOSE:
- User can change his tour plan if needed
- User can do MTP deviation only for PRESENT and FUTURE dates
- PAST dates are NOT valid for deviation

RULE:
- Only present and future dates allowed
- Cannot modify past dates

───────────────────────────────────────────────────────────

👨‍⚕️ **MSL (Doctors & Chemists):** [SFE SYSTEM]

HOW TO ADD DOCTORS:
- User can add doctors in MSL management
- Location: Submit tab → MSL management
- User can add/update doctor list there

───────────────────────────────────────────────────────────

🏖️ **LEAVE:** [SFE SYSTEM]

LEAVE TYPES:
- User has multiple leave types after confirmation:
  - CL (Casual Leave)
  - PL (Paid Leave)
  - SL (Sick Leave)

HOW TO APPLY:
- User can apply leave in system
- Select leave type
- Enter dates
- Submit for approval

───────────────────────────────────────────────────────────

📊 **REPORT:** [SFE SYSTEM]
- User has multiple reports in Report tab
- Users can download and explore them

───────────────────────────────────────────────────────────

For RED ERRORS or unknown issues:
→ Take screenshot and send to sfesupport@walterbushnell.com

TONE: Professional, step-by-step, match user language exactly, supportive, ONLY use training data provided.`;

function submitForm() {
  const email = document.getElementById('emailInput').value.trim();
  const division = document.getElementById('divisionInput').value;
  const hq = document.getElementById('hqInput').value.trim();

  document.getElementById('emailError').textContent = '';
  document.getElementById('divisionError').textContent = '';
  document.getElementById('hqError').textContent = '';

  let valid = true;

  if (!email || !email.includes('@')) {
    document.getElementById('emailError').textContent = 'Valid email required';
    valid = false;
  }
  if (!division) {
    document.getElementById('divisionError').textContent = 'Select division';
    valid = false;
  }
  if (!hq) {
    document.getElementById('hqError').textContent = 'Enter HQ';
    valid = false;
  }

  if (!valid) return;

  userEmail = email;
  userDivision = division;
  userHQ = hq;

  document.getElementById('modal').classList.remove('active');
  document.getElementById('chat-container').style.display = 'flex';

  addBotMessage(`✅ Great! Your details saved:\n📧 ${email}\n🏢 ${division}\n📍 ${hq}\n\nHello! I'm ready to help. Ask me anything about SFE/ESSR in your preferred language!`);
}

function quickReply(text) {
  document.getElementById('userInput').value = text;
  document.getElementById('userInput').focus();
}

function toggleVoiceInput() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    addBotMessage('⚠️ Voice input not supported in your browser');
    return;
  }

  if (isRecording) {
    stopVoiceInput();
    return;
  }

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRecognition();
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.lang = 'hi-IN';

  document.getElementById('voice-btn').classList.add('recording');
  document.getElementById('voice-btn').textContent = '🔴';
  isRecording = true;

  recognition.onresult = (event) => {
    let transcript = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      transcript += event.results[i][0].transcript;
    }
    document.getElementById('userInput').value = transcript;
  };

  recognition.onend = () => {
    stopVoiceInput();
    const text = document.getElementById('userInput').value.trim();
    if (text) sendMessage();
  };

  recognition.onerror = (event) => {
    stopVoiceInput();
    addBotMessage('⚠️ Voice input error: ' + event.error);
  };

  recognition.start();
}

function stopVoiceInput() {
  isRecording = false;
  document.getElementById('voice-btn').classList.remove('recording');
  document.getElementById('voice-btn').textContent = '🎤';
  if (recognition) recognition.stop();
}

function toggleVoiceOutput() {
  ttsEnabled = !ttsEnabled;
  document.getElementById('tts-btn').textContent = ttsEnabled ? '🔊' : '🔇';
}

function handleFileUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  attachedFile = file;
  document.getElementById('file-preview').textContent = '📎 ' + file.name;
  document.getElementById('file-preview').classList.add('show');
}

function addBotMessage(text) {
  const msgDiv = document.createElement('div');
  msgDiv.className = 'message bot';
  msgDiv.innerHTML = `
    <div class="avatar bot">🤖</div>
    <div class="bubble">${text.replace(/\n/g, '<br>')}</div>
  `;
  document.getElementById('messages').appendChild(msgDiv);
  document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;

  if (ttsEnabled) speakText(text);
}

function addUserMessage(text) {
  const msgDiv = document.createElement('div');
  msgDiv.className = 'message user';
  let content = text;
  if (attachedFile) {
    content += ` (📎 ${attachedFile.name})`;
  }
  msgDiv.innerHTML = `
    <div class="avatar user">👤</div>
    <div class="bubble">${content}</div>
  `;
  document.getElementById('messages').appendChild(msgDiv);
  document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
}

function speakText(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const cleanText = text.replace(/[🙏👤🤖✅⚠️📋🏥📅🗺️💰🏖️📊❓🔊🔇🎤🔴]/gu, '').replace(/\*\*/g, '').trim();
  const utterance = new SpeechSynthesisUtterance(cleanText);
  utterance.lang = 'hi-IN';
  utterance.rate = 0.9;
  window.speechSynthesis.speak(utterance);
}

async function sendMessage() {
  const text = document.getElementById('userInput').value.trim();
  if (!text) return;

  document.getElementById('userInput').value = '';
  document.getElementById('file-preview').classList.remove('show');
  addUserMessage(text);
  attachedFile = null;

  const typingDiv = document.createElement('div');
  typingDiv.className = 'message bot';
  typingDiv.id = 'typing-indicator';
  typingDiv.innerHTML = `
    <div class="avatar bot">🤖</div>
    <div class="bubble" style="padding:8px">💭 Thinking...</div>
  `;
  document.getElementById('messages').appendChild(typingDiv);
  document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;

  try {
    const systemMsg = `${SYS_PROMPT}\n\nCurrent User: Email: ${userEmail}, Division: ${userDivision}, HQ: ${userHQ}`;

    const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer 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'
      },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        messages: [
          { role: 'system', content: systemMsg },
          { role: 'user', content: text }
        ],
        temperature: 0.5,
        max_tokens: 500
      })
    });

    const data = await response.json();
    const reply = data.choices?.[0]?.message?.content || 'Sorry, no response.';

    document.getElementById('typing-indicator').remove();
    addBotMessage(reply);
  } catch (error) {
    document.getElementById('typing-indicator').remove();
    addBotMessage('⚠️ Error: ' + error.message);
  }
}

document.getElementById('emailInput').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') submitForm();
});

document.getElementById('hqInput').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') submitForm();
});
</script>

</body>
</html>
