<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WB SFE Support Bot</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --wb-navy: #0f2547;
  --wb-blue: #1a56db;
  --wb-sky: #e8f0fd;
  --surface: #ffffff;
  --bg: #f1f5fb;
  --border: #dde4f0;
  --text: #1e293b;
  --muted: #64748b;
}
html, body { height: 100%; font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); }

.container {
  display: flex;
  flex-direction: column;
  height: 100vh;
  max-width: 900px;
  margin: 0 auto;
  background: var(--surface);
  box-shadow: 0 0 40px rgba(0,0,0,0.1);
}

.header {
  background: linear-gradient(135deg, var(--wb-navy) 0%, var(--wb-blue) 100%);
  color: white;
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.header-icon { font-size: 28px; }

.header-text h1 { font-size: 16px; margin: 0; font-weight: 600; }
.header-text p { font-size: 12px; margin: 2px 0 0 0; opacity: 0.8; }

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.message { display: flex; gap: 10px; margin-bottom: 8px; }
.message.user { flex-direction: row-reverse; }

.avatar {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}

.avatar.bot { background: var(--wb-sky); }
.avatar.user { background: var(--wb-blue); color: white; }

.bubble {
  max-width: 70%;
  padding: 12px 14px;
  border-radius: 12px;
  word-break: break-word;
  line-height: 1.5;
  font-size: 13px;
}

.message.bot .bubble {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
}

.message.user .bubble {
  background: var(--wb-blue);
  color: white;
}

.chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding: 0 20px;
  margin-bottom: 8px;
}

.chip-btn {
  padding: 6px 14px;
  border: 1px solid var(--border);
  border-radius: 20px;
  background: white;
  cursor: pointer;
  font-size: 12px;
  font-weight: 500;
  transition: all 0.2s;
  font-family: inherit;
}

.chip-btn:hover {
  background: var(--wb-sky);
  border-color: var(--wb-blue);
  transform: translateY(-2px);
}

.input-section {
  border-top: 1px solid var(--border);
  padding: 12px 20px;
  display: flex;
  gap: 10px;
  align-items: flex-end;
}

.input-section textarea {
  flex: 1;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px;
  font-family: inherit;
  font-size: 14px;
  resize: none;
  max-height: 100px;
}

.input-section textarea:focus {
  outline: none;
  border-color: var(--wb-blue);
}

.btn-icon {
  width: 40px;
  height: 40px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: white;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  transition: all 0.2s;
}

.btn-icon:hover {
  background: var(--wb-sky);
  border-color: var(--wb-blue);
}

.btn-icon.recording {
  background: #fee2e2;
  border-color: #ef4444;
  animation: pulse 1s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}

.send-btn {
  padding: 10px 20px;
  background: var(--wb-blue);
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 600;
  font-size: 14px;
  font-family: inherit;
  transition: all 0.2s;
}

.send-btn:hover { background: var(--wb-navy); }
.send-btn:disabled { background: var(--border); cursor: not-allowed; }

.footer {
  padding: 10px;
  text-align: center;
  font-size: 10px;
  color: var(--muted);
  border-top: 1px solid var(--border);
}

/* MODAL STYLES */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.5);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  font-family: 'Segoe UI', system-ui, sans-serif;
}

.modal-overlay.active { display: flex; }

.modal-box {
  background: white;
  padding: 40px;
  border-radius: 12px;
  max-width: 400px;
  width: 90%;
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
}

.modal-box h2 {
  font-size: 20px;
  margin-bottom: 10px;
  color: var(--wb-navy);
}

.modal-box p {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 24px;
}

.form-field {
  margin-bottom: 18px;
}

.form-field label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 6px;
  color: var(--text);
}

.form-field input,
.form-field select {
  width: 100%;
  padding: 10px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-family: inherit;
  font-size: 14px;
}

.form-field input:focus,
.form-field select:focus {
  outline: none;
  border-color: var(--wb-blue);
}

.form-error {
  color: #dc2626;
  font-size: 12px;
  margin-top: 4px;
}

.modal-submit {
  width: 100%;
  padding: 12px;
  background: var(--wb-blue);
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-weight: 600;
  font-size: 14px;
  font-family: inherit;
}

.modal-submit:hover { background: var(--wb-navy); }

#file-input { display: none; }

.file-preview {
  display: none;
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 8px;
  padding: 8px;
  background: var(--bg);
  border-radius: 4px;
}

.file-preview.show { display: block; }
</style>
</head>

Cause: MTP has not been approved by SM in system
Solution:

  → After SM approval, user can check approved MTP
  → Then proceed with other tasks

---

🔴 **ERROR: "Cannot approve unlock request - Expense saved"**
Cause: User saved expense in system, then unlock request cannot be approved
Solution:
  → Unlock request can ONLY be REJECTED now (not approved)
  → User needs to REJECT the unlock request
  → Then user can submit final expense in system
  → Important: Once expense is saved, unlock can only be rejected

---

🔴 **ERROR: "Please create new STP for [route name]"**
Cause: Tour plan route ≠ DCR locations
Example: Tour plan was "Delhi-Gurgaon-Faridabad-Delhi" but DCR only shows "Delhi"
Solution:
  → User needs to create NEW STP matching actual DCR locations
  → Follow STP creation steps: Submit Tab → Standard Tour Plan

🔴 **ERROR: "ESSR Login Error" / "Password Expired"**

🔴 **ERROR: "Please visit all planned locations" / "Missing visited places"**
Cause: Visited places in DCR ≠ planned places in MTP
Example: MTP has many places but only one place showing as visited
Solution:
  → Click EDIT button on the error screen
  → Update visited places to match MTP plan
  → Make sure all planned locations are marked as visited
  → Then resubmit

---

🔴 **MESSAGE: "Do you want to confirm leave and send unlock request?"**
Cause: System asking for leave confirmation

  → System will also ask about sending unlock request
  → Follow system prompts to complete leave application

🔴 **MESSAGE: "Please approve/reject DCR unlock request"**
Cause: SM needs to take action on unlock request
Solution:
  → SM needs to send approval via email OR
  → User can send rejection request for that day
  → After SM approval/rejection, unlock will process

function submitForm() {
  const email = document.getElementById('emailInput').value.trim();
  const division = document.getElementById('divisionInput').value;
  const hq = document.getElementById('hqInput').value.trim();

  document.getElementById('emailError').textContent = '';
  document.getElementById('divisionError').textContent = '';
  document.getElementById('hqError').textContent = '';

  let valid = true;

  if (!email || !email.includes('@')) {
    document.getElementById('emailError').textContent = 'Valid email required';
    valid = false;
  } else if (!email.endsWith('@walterbushnell.com')) {
    document.getElementById('emailError').textContent = 'Email must be @walterbushnell.com domain only';
    valid = false;
  }
  if (!division) {
    document.getElementById('divisionError').textContent = 'Select division';
    valid = false;
  }
  if (!hq) {
    document.getElementById('hqError').textContent = 'Enter HQ';
    valid = false;
  }

  if (!valid) return;

  userEmail = email;
  userDivision = division;
  userHQ = hq;

  document.getElementById('modal').classList.remove('active');
  document.getElementById('chat-container').style.display = 'flex';

  addBotMessage(`✅ Great! Your details saved:\n📧 ${email}\n🏢 ${division}\n📍 ${hq}\n\nHello! I'm ready to help. Ask me anything about SFE/ESSR in your preferred language!`);
}

function toggleVoiceInput() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    addBotMessage('⚠️ Voice input not supported in your browser');
    return;
  }

  if (isRecording) {
    stopVoiceInput();
    return;
  }

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRecognition();
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.lang = 'hi-IN';

  document.getElementById('voice-btn').classList.add('recording');
  document.getElementById('voice-btn').textContent = '🔴';
  isRecording = true;

  recognition.onresult = (event) => {
    let transcript = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      transcript += event.results[i][0].transcript;
    }
    document.getElementById('userInput').value = transcript;
  };

  recognition.onend = () => {
    stopVoiceInput();
    const text = document.getElementById('userInput').value.trim();
    if (text) sendMessage();
  };

  recognition.onerror = (event) => {
    stopVoiceInput();
    addBotMessage('⚠️ Voice input error: ' + event.error);
  };

  recognition.start();
}

function stopVoiceInput() {
  isRecording = false;
  document.getElementById('voice-btn').classList.remove('recording');
  document.getElementById('voice-btn').textContent = '🎤';
  if (recognition) recognition.stop();
}

function toggleVoiceOutput() {
  ttsEnabled = !ttsEnabled;
  document.getElementById('tts-btn').textContent = ttsEnabled ? '🔊' : '🔇';
}

function identifyErrorFromScreenshot(userDescription) {
  const desc = userDescription.toLowerCase();
  
  // Try to match known errors
  for (const [keyword, errorInfo] of Object.entries(KNOWN_ERRORS)) {
    if (desc.includes(keyword)) {
      return errorInfo;
    }
  }
  
  // If no match found
  return KNOWN_ERRORS['red error'];
}

function addBotMessage(text) {
  const msgDiv = document.createElement('div');
  msgDiv.className = 'message bot';
  msgDiv.innerHTML = `
    <div class="avatar bot">🤖</div>
    <div class="bubble">${text.replace(/\n/g, '<br>')}</div>
  `;
  document.getElementById('messages').appendChild(msgDiv);
  document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;

  if (ttsEnabled) speakText(text);
}

function addUserMessage(text) {
  const msgDiv = document.createElement('div');
  msgDiv.className = 'message user';
  let content = text;
  if (attachedFile) {
    content += ` (📎 ${attachedFile.name})`;
  }
  msgDiv.innerHTML = `
    <div class="avatar user">👤</div>
    <div class="bubble">${content}</div>
  `;
  document.getElementById('messages').appendChild(msgDiv);
  document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
}

function speakText(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const cleanText = text.replace(/[🙏👤🤖✅⚠️📋🏥📅🗺️💰🏖️📊❓🔊🔇🎤🔴]/gu, '').replace(/\*\*/g, '').trim();
  const utterance = new SpeechSynthesisUtterance(cleanText);
  utterance.lang = 'hi-IN';
  utterance.rate = 0.9;
  window.speechSynthesis.speak(utterance);
}

function detectIssueType(text) {
  const lower = text.toLowerCase();
  if (lower.includes('dcr') && lower.includes('unlock')) return 'DCR Unlocking';
  if (lower.includes('dcr')) return 'DCR';
  if (lower.includes('mtp') && lower.includes('deviation')) return 'MTP Deviation';
  if (lower.includes('mtp')) return 'MTP';
  if (lower.includes('stp')) return 'STP';
  if (lower.includes('msl') || lower.includes('doctor')) return 'MSL';
  if (lower.includes('expense')) return 'Expense';
  if (lower.includes('leave')) return 'Leave';
  if (lower.includes('report')) return 'Report';
  if (lower.includes('essr')) return 'ESSR';
  return 'Other';
}

    return;
  }

      },

        model: 'llama-3.3-70b-versatile',
        messages: [
          { role: 'system', content: systemMsg },
